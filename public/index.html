<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cucha - Sistema de Gestión Veterinaria</title>
    <link rel="stylesheet" href="css/styles.css?v=1.3">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <i class="fas fa-paw logo-icon me-2"></i><span class="logo-text">MI <span>CUCHA</span></span>
                <small class="text-muted ms-2" style="font-size: 0.6rem;">v2.0</small>
            </div>

            <nav class="nav-menu">
                <a href="#dashboard" class="nav-item active" data-module="dashboard">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#appointments" class="nav-item" data-module="appointments">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Calendario</span>
                </a>
                <a href="#stock" class="nav-item" data-module="stock">
                    <i class="fas fa-boxes"></i>
                    <span>Stock</span>
                </a>
                <a href="#suppliers" class="nav-item" data-module="suppliers">
                    <i class="fas fa-truck-moving"></i>
                    <span>Proveedores</span>
                </a>
                <a href="#sales" class="nav-item" data-module="sales">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Ventas</span>
                </a>
                <a href="#costs" class="nav-item" data-module="costs">
                    <i class="fas fa-receipt"></i>
                    <span>Costos</span>
                </a>
                <a href="#reports" class="nav-item" data-module="reports">
                    <i class="fas fa-chart-line"></i>
                    <span>Reportes</span>
                </a>
            </nav>


        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">

            </header>

            <div id="module-container" class="module-content">
                <!-- Content will be injected here by app.js -->
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js?v=1.3" type="module"></script>
</body>

</html>
